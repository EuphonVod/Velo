<!DOCTYPE html>
<html>
<body>
    <h3>User 1</h3>
    <input id="msg1" type="text" placeholder="send to user 2...">
    <button onclick="send1()">send</button>
    <div id="messages1"></div>

    <h3>User 2</h3>
    <div id="messages2"></div>

    <script>
        const ws1 = new WebSocket("ws://localhost:8000/chat/ws/1");
        const ws2 = new WebSocket("ws://localhost:8000/chat/ws/6");

        ws1.onmessage = (e) => {
            document.getElementById("messages1").innerHTML += "<p>" + e.data + "</p>";
        };
        ws2.onmessage = (e) => {
            document.getElementById("messages2").innerHTML += "<p>" + e.data + "</p>";
        };

        function send1() {
            ws1.send("6:" + document.getElementById("msg1").value);
        }
    </script>
</body>
</html>
